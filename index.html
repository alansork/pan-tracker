<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pan — by sorkthropic</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preload" as="image" href="assets/saturn-8k.jpg" />
  <link rel="preload" as="image" href="assets/earth-8k.jpg" />
</head>
<body>
  <!-- The app runs underneath from the first moment; the landing is a veil
       over it. Music starts as soon as the browser allows (at the latest,
       on your first click — including the enter button). -->
  <div id="hud">
    <div id="hud-time">—</div>
    <div id="hud-lon">—</div>
    <div id="hud-extra">—</div>
  </div>
  <div id="music" title="music (m)">♪</div>
  <div id="hint">click a name to visit · drag · scroll · ←→ time · m ♪</div>

  <div id="landing">
    <main>
      <div class="name">sorkthropic</div>
      <h1>pan</h1>
      <p class="purpose">
        the live position of saturn's ravioli-shaped moon,
        computed from its real orbit — right now, as you read this —
        and rendered among the rings.
      </p>
      <button class="enter" id="enterBtn">enter</button>
    </main>
  </div>

  <script src="vendor/three.min.js"></script>
  <script src="orbit.js"></script>
  <script src="app.js"></script>
</body>
</html>
